services:
  # Docker Registry
  registry:
    image: registry:2
    ports:
      - "5001:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - registry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Registry UI (Development Mode)
  registry-ui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5005:5000"
    environment:
      - READ_ONLY=false
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    volumes:
      - ./registries.config.json:/app/registries.config.json:ro
      - ./data:/app/data
    depends_on:
      - registry
    networks:
      - registry-net
    restart: unless-stopped

volumes:
  registry-data:

networks:
  registry-net:
    driver: bridge
