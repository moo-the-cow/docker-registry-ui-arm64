services:
  registry:
    image: registry:2
    ports:
      - "5001:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - registry-net
  registry-ui:
    image: ghcr.io/vibhuvioio/docker-registry-ui:latest
    ports:
      - "5000:5000"
    environment:
      LOG_LEVEL: "INFO"
      REGISTRIES: '[{"name":"Local Registry","api":"http://registry:5000"}]'
    volumes:
      - ui-data:/app/data
    networks:
      - registry-net
volumes:
  registry-data:
  ui-data:

networks:
  registry-net:
    driver: overlay
    attachable: true