version: '3.8'

services:
  # First Docker Registry
  registry-1:
    image: registry:2
    ports:
      - "5001:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-1-data:/var/lib/registry
    networks:
      - registry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Second Docker Registry
  registry-2:
    image: registry:2
    ports:
      - "5002:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-2-data:/var/lib/registry
    networks:
      - registry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Registry UI
  registry-ui:
    image: ghcr.io/vibhuvioio/docker-registry-ui:latest
    ports:
      - "5003:5000"
    environment:
      # Set to DEBUG for detailed logging, INFO for normal, WARNING for minimal
      LOG_LEVEL: "INFO"
    volumes:
      - ./registries.config.json:/app/registries.config.json:ro
      - ./data:/app/data
    depends_on:
      - registry-1
      - registry-2
    networks:
      - registry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  registry-1-data:
  registry-2-data:

networks:
  registry-net:
    driver: bridge